name: Mobile Tests (Appium)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Catches drift with no code change to trigger it: a Sauce Labs demo-app
    # release renaming its APK asset, saucedemo.com markup shifting, etc.
    - cron: '0 6 * * 1'

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Checkstyle + the swipe-math unit tests need no emulator/Appium server,
  # so they run in their own fast job rather than sharing the expensive
  # emulator-backed job below (which needs KVM, an APK download, and a full
  # emulator boot before it can run anything).
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Checkstyle
        run: mvn checkstyle:check

      - name: Run unit tests
        run: mvn test -Dtest=SwipeHelperTest -DfailIfNoTests=false

  android-tests:
    name: Android Tests (native app + mobile web)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # See apps/README.md — the native-app suite (com.automation.app) is
      # written against Sauce Labs' own open-source demo app, verified
      # against its real source. The mobile-web suite (com.automation.web)
      # needs no app install — it drives saucedemo.com through Chrome,
      # which every google_apis emulator image ships with.
      - name: Download test app (Sauce Labs' My Demo App)
        run: |
          mkdir -p apps/android
          curl -sL "$(curl -s https://api.github.com/repos/saucelabs/my-demo-app-android/releases/latest \
            | grep browser_download_url \
            | grep -v androidTest \
            | grep '\.apk"' \
            | cut -d '"' -f 4)" -o apps/android/mda.apk

      - name: Start Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          disable-animations: true
          script: |
            npm install -g appium
            appium driver install uiautomator2
            appium &
            npx --yes wait-on tcp:127.0.0.1:4723 --timeout 60000
            # No -Dtest filter: verified locally that combining it with a
            # custom suiteXmlFile drops the <parameter name="platform">
            # testng.xml declares, which makes LoginTest's @Parameters
            # setUp() silently match nothing (0 tests run, not even a
            # failure). Plain `mvn test` re-runs the fast unit-tests job's
            # SwipeHelperTest redundantly, which is harmless.
            mvn test -Dplatform=android

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-test-results
          path: target/surefire-reports/
          retention-days: 30
