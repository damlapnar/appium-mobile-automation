name: Mobile Tests (Appium)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-structure:
    name: Validate Project Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Validate POM and resolve dependencies
        run: mvn validate dependency:resolve -q

      - name: Verify framework source files
        run: |
          test -f src/main/java/com/automation/config/DriverManager.java   && echo "DriverManager.java OK"
          test -f src/main/java/com/automation/pages/BasePage.java          && echo "BasePage.java OK"
          test -f src/main/java/com/automation/pages/LoginPage.java         && echo "LoginPage.java OK"
          test -f src/main/java/com/automation/tests/BaseTest.java          && echo "BaseTest.java OK"
          test -f src/main/java/com/automation/tests/LoginTest.java         && echo "LoginTest.java OK"
          test -f src/test/resources/testng.xml                             && echo "testng.xml OK"
          echo "All framework files present"

  android-tests:
    name: Android Mobile Web Tests
    runs-on: ubuntu-latest
    needs: validate-structure
    timeout-minutes: 45
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android mobile web tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          target: default
          arch: x86_64
          profile: Nexus 6
          disable-animations: true
          script: |
            npm install -g appium
            appium driver install uiautomator2
            appium &
            sleep 8
            mvn compile test -Dplatform=android -q

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-test-results
          path: target/surefire-reports/
          retention-days: 30
